name: setdeneme1
description: "SET — Video production marketplace mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.10.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & routing
  get: ^4.7.2

  # Firebase (connection only — no implementation yet)
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.7

  # Networking
  dio: ^5.7.0

  # Local storage
  get_storage: ^2.1.1

  # Media & assets
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  image_picker: ^1.1.2

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.1

  # Animation
  rive: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/role_selection/
    - assets/images/splash_screens/
    - assets/animations/
